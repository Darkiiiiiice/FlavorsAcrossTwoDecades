# 默认配置文件

[server]
host = "127.0.0.1"
port = 3000

[database]
url = "sqlite:target/debug/flavors_game.db"

[llm]
provider = "minimax"
model = "MiniMax-M2.5"
base_url = "https://api.minimaxi.com"
# API Key 可以通过环境变量 FLAVORS__LLM__API_KEY 设置
api_key = ""
timeout_seconds = 60
max_retries = 3
temperature = 0.8
max_tokens = 2048

# Ollama 配置示例
# [llm]
# provider = "ollama"
# model = "qwen3:4b"
# base_url = "http://localhost"
# port = 11434
# timeout_seconds = 60
# max_retries = 3
# temperature = 0.8
# max_tokens = 2048

[game]
# 初始通信延迟范围（秒）
min_communication_delay = 1
max_communication_delay = 50
# 自动存档间隔（秒）
auto_save_interval = 300
# 游戏版本
save_version = 1

[logging]
level = "info"
